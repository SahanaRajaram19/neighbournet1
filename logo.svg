<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Orange background -->
  <rect width="200" height="200" fill="url(#orangeGrad)"/>
  
  <!-- Stylized fan/peacock shape in white (NeighbourNet community spreading) -->
  <g transform="translate(100, 100)">
    <!-- Main semicircle fan base -->
    <path d="M -60 20 Q -60 -40 0 -70 Q 60 -40 60 20" fill="white" stroke="white" stroke-width="2"/>
    
    <!-- Fan segments/rays -->
    <line x1="0" y1="0" x2="0" y2="-65" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-25" y2="-60" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="25" y2="-60" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-45" y2="-40" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="45" y2="-40" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-55" y2="-15" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="55" y2="-15" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Curved side elements -->
    <path d="M -65 -5 Q -75 5 -65 25" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M 65 -5 Q 75 5 65 25" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Center connection circle -->
    <circle cx="0" cy="0" r="10" fill="white"/>
    <circle cx="0" cy="0" r="5" fill="url(#orangeGrad)"/>
  </g>
</svg>
