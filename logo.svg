<?xml version="1.0" encoding="UTF-8"?>
<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle representing community -->
  <circle cx="20" cy="20" r="18" fill="#096C6C" stroke="#FF6F61" stroke-width="1"/>

  <!-- Central hub representing the platform -->
  <circle cx="20" cy="20" r="6" fill="#FF6F61"/>

  <!-- Network connections radiating outward -->
  <g stroke="#FFD700" stroke-width="1.5" stroke-linecap="round">
    <!-- Top connection -->
    <path d="M20 14 L20 8"/>
    <!-- Right connection -->
    <path d="M26 20 L32 20"/>
    <!-- Bottom connection -->
    <path d="M20 26 L20 32"/>
    <!-- Left connection -->
    <path d="M14 20 L8 20"/>
  </g>

  <!-- Diagonal connections creating network pattern -->
  <g stroke="#FFD700" stroke-width="1" stroke-linecap="round">
    <!-- Top-right -->
    <path d="M23 17 L28 12"/>
    <!-- Bottom-right -->
    <path d="M23 23 L28 28"/>
    <!-- Bottom-left -->
    <path d="M17 23 L12 28"/>
    <!-- Top-left -->
    <path d="M17 17 L12 12"/>
  </g>

  <!-- Small nodes representing neighbors/homes -->
  <g fill="#FFD700">
    <!-- Top node -->
    <circle cx="20" cy="10" r="1.5"/>
    <!-- Right node -->
    <circle cx="30" cy="20" r="1.5"/>
    <!-- Bottom node -->
    <circle cx="20" cy="30" r="1.5"/>
    <!-- Left node -->
    <circle cx="10" cy="20" r="1.5"/>
  </g>

  <!-- Brand text element -->
  <text x="20" y="37" text-anchor="middle" fill="#FFD700" font-family="Inter, sans-serif" font-size="3" font-weight="600">NET</text>
</svg>
