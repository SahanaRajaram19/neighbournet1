<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Management - Admin Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-header">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1 style="margin: 0; font-size: 2rem;"><i class="fas fa-box"></i> Item Management</h1>
                    <p style="margin: 0.5rem 0 0 0; opacity: 0.9;">Manage platform items and listings</p>
                </div>
                <div style="text-align: right;">
                    <a href="admin.html" style="color: white; text-decoration: none; font-size: 0.9rem;">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <nav class="admin-nav">
            <a href="admin.html" class="nav-item">
                <i class="fas fa-tachometer-alt"></i>
                Dashboard
            </a>
            <a href="admin-users.html" class="nav-item">
                <i class="fas fa-users"></i>
                Users
            </a>
            <a href="admin-items.html" class="nav-item active">
                <i class="fas fa-box"></i>
                Items
            </a>
            <a href="admin-transactions.html" class="nav-item">
                <i class="fas fa-exchange-alt"></i>
                Transactions
            </a>
            <a href="admin-support.html" class="nav-item">
                <i class="fas fa-headset"></i>
                Support
            </a>
            <a href="admin-reports.html" class="nav-item">
                <i class="fas fa-chart-bar"></i>
                Reports
            </a>
            <a href="admin-settings.html" class="nav-item">
                <i class="fas fa-cog"></i>
                Settings
            </a>
        </nav>
    </div>

    <div class="container">
        <div class="stats-cards">
            <div class="stats-card">
                <h3 id="totalItems">0</h3>
                <p>Total Items</p>
            </div>
            <div class="stats-card">
                <h3 id="availableItems">0</h3>
                <p>Available Items</p>
            </div>
            <div class="stats-card">
                <h3 id="bookedItems">0</h3>
                <p>Booked Items</p>
            </div>
            <div class="stats-card">
                <h3 id="pendingApproval">0</h3>
                <p>Pending Approval</p>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="admin-container">
            <div class="admin-controls">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search items by title, description, or location..." id="itemSearch">
                </div>
                <select class="filter-select" id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="tools">Tools</option>
                    <option value="electronics">Electronics</option>
                    <option value="books">Books</option>
                    <option value="sports">Sports</option>
                    <option value="other">Other</option>
                </select>
                <select class="filter-select" id="statusFilter">
                    <option value="">All Status</option>
                    <option value="available">Available</option>
                    <option value="booked">Booked</option>
                    <option value="unavailable">Unavailable</option>
                </select>
                <select class="filter-select" id="conditionFilter">
                    <option value="">All Conditions</option>
                    <option value="excellent">Excellent</option>
                    <option value="good">Good</option>
                    <option value="fair">Fair</option>
                </select>
                <button class="btn-admin" id="addItemButton">
                    <i class="fas fa-plus"></i>
                    Add New Item
                </button>
            </div>

            <div class="table-responsive">
                <table class="item-table">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Owner</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th>Condition</th>
                            <th>Bookings</th>
                            <th>Date Added</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="itemTableBody">
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <a href="#" class="pagination-btn" id="prevPage">Previous</a>
                <a href="#" class="pagination-btn active" id="currentPage">1</a>
                <a href="#" class="pagination-btn" id="nextPage">Next</a>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetchItems();

            document.getElementById('addItemButton').addEventListener('click', function() {
                // Implement add item functionality
            });

            document.getElementById('prevPage').addEventListener('click', function() {
                // Implement pagination functionality
            });

            document.getElementById('nextPage').addEventListener('click', function() {
                // Implement pagination functionality
            });
        });

        function fetchItems() {
            fetch('/api/items')
                .then(response => response.json())
                .then(data => {
                    populateItems(data);
                    updateStats(data);
                })
                .catch(error => console.error('Error fetching items:', error));
        }

        function populateItems(items) {
            const itemTableBody = document.getElementById('itemTableBody');
            itemTableBody.innerHTML = '';

            items.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <div class="item-info">
                            <img src="${item.imageUrl}" alt="${item.title}" class="item-image">
                            <div class="item-details">
                                <h4>${item.title}</h4>
                                <p>${item.description}</p>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div>
                            <strong>${item.ownerName}</strong>
                            <p>ID: #${item.ownerId}</p>
                        </div>
                    </td>
                    <td>
                        <span class="category-badge">${item.category}</span>
                    </td>
                    <td>
                        <div class="price-highlight">
                            ₹${item.price} <span style="font-size: 0.8em; color: #666;">/ day</span>
                        </div>
                    </td>
                    <td>
                        <span class="status-badge status-${item.status.toLowerCase()}">${item.status}</span>
                    </td>
                    <td>
                        <span class="status-badge status-${item.condition.toLowerCase()}">${item.condition}</span>
                    </td>
                    <td>
                        <div>
                            <p><strong>${item.totalBookings}</strong> Total</p>
                            <p><strong>${item.rating}★</strong> Rating</p>
                        </div>
                    </td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-icon edit" title="Edit Item" data-id="${item.id}"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon approve" title="Approve Item" data-id="${item.id}"><i class="fas fa-check"></i></button>
                            <button class="btn-icon delete" title="Delete Item" data-id="${item.id}"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                `;
                itemTableBody.appendChild(row);
            });

            attachActionHandlers();
        }

        function attachActionHandlers() {
            document.querySelectorAll('.btn-icon.edit').forEach(btn => {
                btn.addEventListener('click', function() {
                    const itemId = this.getAttribute('data-id');
                    // Implement edit item functionality
                });
            });

            document.querySelectorAll('.btn-icon.approve').forEach(btn => {
                btn.addEventListener('click', function() {
                    const itemId = this.getAttribute('data-id');
                    // Implement approve item functionality
                });
            });

            document.querySelectorAll('.btn-icon.delete').forEach(btn => {
                btn.addEventListener('click', function() {
                    const itemId = this.getAttribute('data-id');
                    if (confirm(`Are you sure you want to delete item ID: ${itemId}?`)) {
                        // Implement delete functionality
                    }
                });
            });
        }

        function updateStats(items) {
            document.getElementById('totalItems').textContent = items.length;
            document.getElementById('availableItems').textContent = items.filter(item => item.status === 'Available').length;
            document.getElementById('bookedItems').textContent = items.filter(item => item.status === 'Booked').length;
            document.getElementById('pendingApproval').textContent = items.filter(item => item.status === 'Pending Approval').length;
        }
    </script>
</body>
</html>
