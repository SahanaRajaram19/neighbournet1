<!-- NeighbourNet Custom SVG Icons -->
<!-- Neighborhood Brand Icon -->
<svg id="neighborhood-icon" width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Main house structure -->
  <g id="houses" transform="translate(10, 20)">
    <!-- House 1 -->
    <g class="house-1">
      <!-- House body -->
      <path d="M0 40 L0 20 L15 10 L30 20 L30 40 Z" fill="#FFD700" stroke="#F9C74F" stroke-width="1"/>
      <!-- Roof -->
      <path d="M0 20 L15 10 L30 20" fill="#F9C74F" stroke="#FFD700" stroke-width="1"/>
      <!-- Door -->
      <rect x="10" y="30" width="10" height="10" fill="#096C6C" opacity="0.8"/>
      <!-- Window -->
      <rect x="5" y="25" width="6" height="6" fill="#096C6C" opacity="0.6"/>
    </g>

    <!-- House 2 -->
    <g class="house-2" transform="translate(35, 5)">
      <!-- House body -->
      <path d="M0 35 L0 15 L12 8 L24 15 L24 35 Z" fill="#F9C74F" stroke="#FFD700" stroke-width="1"/>
      <!-- Roof -->
      <path d="M0 15 L12 8 L24 15" fill="#FFD700" stroke="#F9C74F" stroke-width="1"/>
      <!-- Door -->
      <rect x="8" y="25" width="8" height="10" fill="#096C6C" opacity="0.8"/>
      <!-- Window -->
      <rect x="4" y="20" width="5" height="5" fill="#096C6C" opacity="0.6"/>
    </g>

    <!-- Connecting path -->
    <path d="M15 45 Q25 40 35 45" stroke="#096C6C" stroke-width="3" fill="none"/>
  </g>

  <!-- Tree/Community element -->
  <g id="tree" transform="translate(55, 15)">
    <!-- Tree trunk -->
    <rect x="8" y="35" width="4" height="15" fill="#8B4513"/>
    <!-- Tree foliage -->
    <circle cx="10" cy="25" r="12" fill="#228B22" opacity="0.8"/>
    <circle cx="10" cy="20" r="8" fill="#32CD32" opacity="0.9"/>
  </g>
</svg>

<!-- Category Icons -->
<!-- List Items Icon -->
<svg id="list-items-icon" width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <rect x="5" y="10" width="50" height="40" rx="8" fill="#FFD700" stroke="#F9C74F" stroke-width="2"/>
  <rect x="10" y="15" width="40" height="3" fill="#096C6C" opacity="0.7"/>
  <rect x="10" y="22" width="30" height="3" fill="#096C6C" opacity="0.7"/>
  <rect x="10" y="29" width="35" height="3" fill="#096C6C" opacity="0.7"/>
  <!-- Plus sign -->
  <circle cx="45" cy="35" r="8" fill="#FF6F61"/>
  <path d="M41 35 L49 35 M45 31 L45 39" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>

<!-- Borrow Icon -->
<svg id="borrow-icon" width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Hand 1 -->
  <g class="hand-1">
    <ellipse cx="15" cy="35" rx="8" ry="12" fill="#F9C74F"/>
    <ellipse cx="15" cy="30" rx="6" ry="8" fill="#FFD700"/>
    <!-- Fingers -->
    <ellipse cx="12" cy="25" rx="2" ry="4" fill="#FFD700"/>
    <ellipse cx="15" cy="23" rx="2" ry="5" fill="#FFD700"/>
    <ellipse cx="18" cy="25" rx="2" ry="4" fill="#FFD700"/>
  </g>

  <!-- Exchange arrow -->
  <path d="M25 30 L35 30 L35 25 L40 30 L35 35 L35 30" fill="#096C6C"/>

  <!-- Hand 2 -->
  <g class="hand-2">
    <ellipse cx="45" cy="35" rx="8" ry="12" fill="#F9C74F"/>
    <ellipse cx="45" cy="30" rx="6" ry="8" fill="#FFD700"/>
    <!-- Fingers -->
    <ellipse cx="42" cy="25" rx="2" ry="4" fill="#FFD700"/>
    <ellipse cx="45" cy="23" rx="2" ry="5" fill="#FFD700"/>
    <ellipse cx="48" cy="25" rx="2" ry="4" fill="#FFD700"/>
  </g>
</svg>

<!-- Rent Icon -->
<svg id="rent-icon" width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <rect x="10" y="15" width="40" height="35" rx="8" fill="#FFD700" stroke="#F9C74F" stroke-width="2"/>
  <!-- Key hole -->
  <circle cx="30" cy="32" r="8" fill="#096C6C" opacity="0.8"/>
  <rect x="28" y="25" width="4" height="10" fill="#096C6C"/>
  <!-- Key teeth -->
  <g transform="translate(25, 20)">
    <rect x="0" y="0" width="10" height="3" fill="#096C6C"/>
    <rect x="1" y="3" width="8" height="2" fill="#096C6C"/>
    <rect x="2" y="5" width="6" height="2" fill="#096C6C"/>
  </g>
</svg>

<!-- Services Icon -->
<svg id="services-icon" width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Person -->
  <circle cx="30" cy="20" r="8" fill="#FFD700"/>
  <path d="M20 45 Q20 35 30 35 Q40 35 40 45" fill="#FFD700"/>

  <!-- Toolbox -->
  <rect x="15" y="35" width="30" height="15" rx="3" fill="#F9C74F" stroke="#FFD700" stroke-width="1"/>
  <!-- Tools -->
  <rect x="18" y="38" width="3" height="9" fill="#096C6C"/>
  <rect x="23" y="38" width="3" height="9" fill="#096C6C"/>
  <circle cx="35" cy="42" r="3" fill="#096C6C"/>
</svg>

<!-- Help & Support Icons -->
<!-- Borrowing Help Icon -->
<svg id="borrow-help-icon" width="50" height="50" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
  <g class="hand-exchange">
    <ellipse cx="12" cy="28" rx="6" ry="8" fill="#F9C74F"/>
    <ellipse cx="12" cy="24" rx="4" ry="6" fill="#FFD700"/>
    <path d="M18 25 L28 25 L28 20 L33 25 L28 30 L28 25" fill="#096C6C"/>
    <ellipse cx="38" cy="28" rx="6" ry="8" fill="#F9C74F"/>
    <ellipse cx="38" cy="24" rx="4" ry="6" fill="#FFD700"/>
  </g>
</svg>

<!-- Renting Help Icon -->
<svg id="rent-help-icon" width="50" height="50" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
  <rect x="8" y="12" width="34" height="28" rx="6" fill="#FFD700" stroke="#F9C74F" stroke-width="1"/>
  <circle cx="25" cy="26" r="6" fill="#096C6C" opacity="0.8"/>
  <rect x="23" y="20" width="4" height="8" fill="#096C6C"/>
</svg>

<!-- Services Help Icon -->
<svg id="services-help-icon" width="50" height="50" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
  <circle cx="25" cy="18" r="6" fill="#FFD700"/>
  <path d="M18 35 Q18 28 25 28 Q32 28 32 35" fill="#FFD700"/>
  <rect x="12" y="28" width="26" height="12" rx="2" fill="#F9C74F" stroke="#FFD700" stroke-width="1"/>
</svg>

<!-- Account Help Icon -->
<svg id="account-help-icon" width="50" height="50" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
  <circle cx="25" cy="18" r="8" fill="#FFD700"/>
  <path d="M15 38 Q15 30 25 30 Q35 30 35 38" fill="#FFD700"/>
  <!-- Shield badge -->
  <path d="M25 8 L28 12 L32 10 L30 15 L35 18 L30 21 L32 26 L28 24 L25 28 L22 24 L18 26 L20 21 L15 18 L20 15 L18 10 L22 12 Z" fill="#096C6C" opacity="0.7"/>
</svg>

<!-- Safety Help Icon -->
<svg id="safety-help-icon" width="50" height="50" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield -->
  <path d="M25 8 L35 12 L35 25 C35 32 25 40 25 40 C25 40 15 32 15 25 L15 12 Z" fill="#FFD700" stroke="#F9C74F" stroke-width="2"/>
  <!-- Lock -->
  <rect x="20" y="22" width="10" height="8" rx="2" fill="#096C6C"/>
  <rect x="22" y="20" width="6" height="4" fill="#096C6C"/>
  <!-- Checkmark -->
  <path d="M22 26 L24 28 L28 22" stroke="white" stroke-width="2" fill="none"/>
</svg>

<style>
/* Icon Animations */
@keyframes iconFloat {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-4px) scale(1.05); }
}

@keyframes iconGlow {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.3)); }
    50% { filter: drop-shadow(0 0 16px rgba(255, 215, 0, 0.6)); }
}

@keyframes iconRotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes houseBounce {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-2px); }
}

@keyframes handWave {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(3deg); }
}

/* Apply animations */
#neighborhood-icon #houses .house-1 {
    animation: houseBounce 3s ease-in-out infinite;
}

#neighborhood-icon #houses .house-2 {
    animation: houseBounce 3s ease-in-out infinite;
    animation-delay: 1.5s;
}

#neighborhood-icon #tree {
    animation: iconFloat 4s ease-in-out infinite;
}

#borrow-icon .hand-1 {
    animation: handWave 2s ease-in-out infinite;
}

#borrow-icon .hand-2 {
    animation: handWave 2s ease-in-out infinite;
    animation-delay: 1s;
}

.category-icon:hover {
    animation: iconGlow 1.5s ease-in-out infinite;
}

/* Hover effects for category icons */
.category-icon {
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.category-icon:hover {
    transform: scale(1.1) rotate(5deg);
    filter: drop-shadow(0 8px 16px rgba(255, 215, 0, 0.4));
}

/* Icon container styles */
.icon-container {
    display: inline-block;
    position: relative;
}

.icon-container.glassmorphic {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    padding: 8px;
}
</style>
