<script>
// Universal Navigation JavaScript
function updateBreadcrumbs() {
    const currentPage = window.location.pathname.split('/').pop().replace('.html', '') || 'home';
    const pageNames = {
        'index': 'Home',
        'borrow': 'Browse Items',
        'product-detail': 'Item Details',
        'profile': 'My Profile',
        'auth': 'Login / Sign Up',
        'support': 'Help & Support'
    };

    const breadcrumbCurrent = document.querySelector('.breadcrumb-current');
    if (breadcrumbCurrent) {
        breadcrumbCurrent.textContent = pageNames[currentPage] || 'Current Page';
    }
}

function toggleSidebar() {
    const sidebar = document.getElementById('sidebarNav');
    const backdrop = document.querySelector('.sidebar-backdrop');

    if (sidebar.classList.contains('open')) {
        closeSidebar();
    } else {
        openSidebar();
    }
}

function openSidebar() {
    const sidebar = document.getElementById('sidebarNav');
    const backdrop = document.querySelector('.sidebar-backdrop') || createSidebarBackdrop();

    sidebar.classList.add('open');
    document.body.style.overflow = 'hidden';

    // Trigger animation
    setTimeout(() => {
        sidebar.classList.add('sidebar-slide-in');
    }, 10);
}

function closeSidebar() {
    const sidebar = document.getElementById('sidebarNav');
    const backdrop = document.querySelector('.sidebar-backdrop');

    sidebar.classList.remove('open');
    sidebar.classList.add('sidebar-slide-out');
    document.body.style.overflow = '';

    if (backdrop) {
        backdrop.classList.remove('show');
    }

    setTimeout(() => {
        sidebar.classList.remove('sidebar-slide-in', 'sidebar-slide-out');
    }, 400);
}

function createSidebarBackdrop() {
    const backdrop = document.createElement('div');
    backdrop.className = 'sidebar-backdrop';
    backdrop.onclick = closeSidebar;

    backdrop.addEventListener('click', closeSidebar);
    document.body.appendChild(backdrop);

    // Trigger show animation
    setTimeout(() => {
        backdrop.classList.add('show');
    }, 10);

    return backdrop;
}

function scrollToTop() {
    window.scrollTo({
        top: 0,
        behavior: 'smooth'
    });
    closeSidebar();
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
    updateBreadcrumbs();

    // Add keyboard shortcut for sidebar (Ctrl/Cmd + B)
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
            e.preventDefault();
            toggleSidebar();
        }

        // ESC to close sidebar
        if (e.key === 'Escape') {
            closeSidebar();
        }
    });

    // Close sidebar when clicking outside
    document.addEventListener('click', function(e) {
        const sidebar = document.getElementById('sidebarNav');
        const toggle = document.querySelector('.sidebar-toggle');

        if (sidebar.classList.contains('open') &&
            !sidebar.contains(e.target) &&
            !toggle.contains(e.target)) {
            closeSidebar();
        }
    });

    console.log('🧭 Universal Navigation Loaded!');
});
</script>
